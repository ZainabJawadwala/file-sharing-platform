<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Sharing Platform - Upload</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>📤 Upload File</h2>
    <form action="/upload/1" method="post" enctype="multipart/form-data">
      <label for="file-upload" class="sr-only">Choose file to upload</label>
      <input id="file-upload" type="file" name="file" accept="*/*" aria-label="File to upload" required>
      <button type="submit">Upload File</button>
    </form>
  </div>
</body>
</html>
